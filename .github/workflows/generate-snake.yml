name: Generate Snake Animation

on:
  push:
    branches:
      - main
    paths-ignore:
      - game.gif
      - profile-3d-contrib/**
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake files
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pink-snake.gif?color_snake=#ff5fa2&color_dots=#ffe3ee,#ffc2da,#ff9bc2,#ff74ad,#ff4f9a
            dist/pink-snake.svg?color_snake=#ff5fa2&color_dots=#ffe3ee,#ffc2da,#ff9bc2,#ff74ad,#ff4f9a
            dist/pink-snake-dark.svg?palette=github-dark&color_snake=#ff7eb6&color_dots=#161b22,#2b1737,#5b224f,#a13b79,#ff7eb6

      - name: Push snake assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
